name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  build-and-push:
    name: Build and push images
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    outputs:
      backend_tag: ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha }}
      frontend_tag: ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve deploy SHA
        id: meta
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose template
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          cat deploy/compose.yaml | ssh "${VPS_USER}@${VPS_HOST}" "cat > '${VPS_DEPLOY_PATH}/compose.yaml.template'"

      - name: Render compose file and restart services
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_tag }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_tag }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" \
            BACKEND_IMAGE="${BACKEND_IMAGE}" \
            FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
            VPS_DEPLOY_PATH="${VPS_DEPLOY_PATH}" \
            bash -s <<'EOF'
          set -euo pipefail

          cd "${VPS_DEPLOY_PATH}"

          export BACKEND_IMAGE FRONTEND_IMAGE
          sed \
            -e "s|\${BACKEND_IMAGE}|${BACKEND_IMAGE}|g" \
            -e "s|\${FRONTEND_IMAGE}|${FRONTEND_IMAGE}|g" \
            compose.yaml.template > compose.yaml

          docker compose pull
          docker compose run --rm migrate
          docker compose down
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
