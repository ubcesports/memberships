# For locally testing services using docker
services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'exec /usr/local/bin/goose -dir /app/sql/migrations postgres "$$DATABASE_URL" up',
      ]

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
      - .env
    environment:
      BASE_URL: http://0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      FRONTEND_URL: http://localhost:3000
      OAUTH_CALLBACK_URL: http://localhost:8080/auth/oauth/jasperlabs/callback
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    labels:
      com.ubcea.logs.enabled: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"
    labels:
      com.ubcea.logs.enabled: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      GCLOUD_HOSTED_LOGS_URL: ${GCLOUD_HOSTED_LOGS_URL:?Set GCLOUD_HOSTED_LOGS_URL}
      GCLOUD_HOSTED_LOGS_ID: ${GCLOUD_HOSTED_LOGS_ID:?Set GCLOUD_HOSTED_LOGS_ID}
      GCLOUD_RW_API_KEY: ${GCLOUD_RW_API_KEY:?Set GCLOUD_RW_API_KEY}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "127.0.0.1:12345:12345"
    restart: unless-stopped

volumes:
  postgres-data:
  alloy-data:
